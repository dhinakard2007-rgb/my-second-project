<!DOCTYPE html>
<html>
<head>
    <title>D1n4xx</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #000;
            color: white;
        }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            background: #000;
            padding: 15px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            border-bottom: 1px solid #333;
        }

        /* Feed */
        .feed {
            max-width: 500px;
            margin: auto;
        }

        .post {
            border-bottom: 1px solid #222;
            margin-bottom: 20px;
        }

        .post img {
            width: 100%;
        }

        /* Actions */
        .actions {
            padding: 10px;
        }

        .like {
            cursor: pointer;
            font-size: 22px;
        }

        .liked {
            color: red;
        }

        .caption {
            padding: 0 10px 10px;
            font-size: 14px;
        }

        /* Viewer */
        .viewer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            justify-content: center;
            align-items: center;
        }

        .viewer img {
            max-width: 95%;
            max-height: 95%;
        }

        .close {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 30px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="header">📸 D1n4xx</div>

<div class="feed">

    <div class="post">
        <img src="https://picsum.photos/500/400?random=1" onclick="openViewer(this.src)">
        <div class="actions">
            <span class="like" onclick="toggleLike(this)">♡</span>
        </div>
        <div class="caption">Random shot 🚀</div>
    </div>

    <div class="post">
        <img src="https://picsum.photos/500/450?random=2" onclick="openViewer(this.src)">
        <div class="actions">
            <span class="like" onclick="toggleLike(this)">♡</span>
        </div>
        <div class="caption">Another vibe 🔥</div>
    </div>

    <div class="post">
        <img src="https://picsum.photos/500/420?random=3" onclick="openViewer(this.src)">
        <div class="actions">
            <span class="like" onclick="toggleLike(this)">♡</span>
        </div>
        <div class="caption">D1n4xx style 😎</div>
    </div>

</div>

<!-- Fullscreen Viewer -->
<div class="viewer" id="viewer">
    <span class="close" onclick="closeViewer()">&times;</span>
    <img id="viewer-img">
</div>

<script>
function toggleLike(el) {
    if (el.classList.contains("liked")) {
        el.classList.remove("liked");
        el.innerText = "♡";
    } else {
        el.classList.add("liked");
        el.innerText = "❤️";
    }
}

function openViewer(src) {
    document.getElementById("viewer").style.display = "flex";
    document.getElementById("viewer-img").src = src;
}

function closeViewer() {
    document.getElementById("viewer").style.display = "none";
}
</script>

</body>
</html>
