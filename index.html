<!DOCTYPE html>
<html>
<head>
<title>D1n4xx</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:black;
    color:white;
}

/* Splash */
#splash {
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
    background:black;
    z-index:10;
}

/* Pages */
.page { display:none; padding-bottom:60px; }
.active { display:block; }

.header {
    text-align:center;
    padding:15px;
    border-bottom:1px solid #333;
}

/* FEED */
.feed {
    max-width:500px;
    margin:auto;
}

.post img {
    width:100%;
}

/* COMMENTS */
.comments {
    padding:10px;
}

/* PROFILE */
.profile-page {
    text-align:center;
    padding:20px;
}

.profile-pic {
    width:90px;
    height:90px;
    border-radius:50%;
    background:#555;
    margin:auto;
    overflow:hidden;
}

.profile-pic img {
    width:100%;
    height:100%;
    object-fit:cover;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:repeat(3,1fr);
}
.grid img {
    width:100%;
    height:120px;
    object-fit:cover;
}

/* NAV */
.nav {
    position:fixed;
    bottom:0;
    width:100%;
    background:#111;
    display:flex;
    justify-content:space-around;
    padding:10px;
}

/* REELS (TikTok style) */
#reels {
    height:100vh;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
}

.reel {
    height:100vh;
    scroll-snap-align:start;
    position:relative;
}

.reel video {
    width:100%;
    height:100%;
    object-fit:cover;
}
</style>
</head>

<body>

<div id="splash">D1n4xx</div>

<!-- HOME -->
<div id="home" class="page active">

    <div class="header">Home</div>

    <div style="text-align:center;">
        <input type="file" id="fileInput">
        <button onclick="upload()">Upload</button>
    </div>

    <div id="feed"></div>
</div>

<!-- REELS -->
<div id="reels" class="page"></div>

<!-- PROFILE -->
<div id="profile" class="page">

    <div class="header">Profile</div>

    <div class="profile-page">

        <div class="profile-pic" onclick="profileInput.click()">
            <img id="profileImg">
        </div>
        <input type="file" id="profileInput" hidden onchange="uploadProfile()">

        <h2>d1n4xx</h2>

        <p><b id="followers">100</b> Followers</p>
    </div>

    <div class="grid" id="grid"></div>
</div>

<!-- NAV -->
<div class="nav">
    <div onclick="showPage('home')">🏠</div>
    <div onclick="showPage('reels')">🎬</div>
    <div onclick="showPage('profile')">👤</div>
</div>

<script>

/* ---------------- SPLASH ---------------- */
setTimeout(()=> splash.style.display="none",2000);

/* ---------------- NAV ---------------- */
function showPage(id){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

/* ---------------- FEED (INFINITE UNIQUE IMAGES) ---------------- */

let posts = JSON.parse(localStorage.getItem("posts")) || [];

function randomImage(){
    return `https://picsum.photos/500/${300+Math.floor(Math.random()*400)}?t=${Date.now()+Math.random()}`;
}

// init
if(posts.length === 0){
    for(let i=0;i<12;i++) posts.push(randomImage());
}

function loadMorePosts(){
    for(let i=0;i<6;i++){
        posts.push(randomImage());
    }
}

/* ---------------- RENDER ---------------- */

function render(){
    let feed = document.getElementById("feed");
    let grid = document.getElementById("grid");

    feed.innerHTML="";
    grid.innerHTML="";

    posts.forEach(src=>{
        feed.innerHTML += `<img src="${src}">`;
        grid.innerHTML += `<img src="${src}">`;
    });
}

/* ---------------- UPLOAD ---------------- */

function upload(){
    let file = fileInput.files[0];
    if(!file) return;

    let reader = new FileReader();
    reader.onload = e=>{
        posts.unshift(e.target.result);
        localStorage.setItem("posts", JSON.stringify(posts));
        render();
    };
    reader.readAsDataURL(file);
}

/* ---------------- PROFILE ---------------- */

if(localStorage.getItem("profile")){
    profileImg.src = localStorage.getItem("profile");
}

function uploadProfile(){
    let file = profileInput.files[0];
    if(!file) return;

    let reader = new FileReader();
    reader.onload = e=>{
        localStorage.setItem("profile", e.target.result);
        profileImg.src = e.target.result;
    };
    reader.readAsDataURL(file);
}

/* ---------------- REELS (NO REPEATS, REAL VARIETY) ---------------- */

let videoPool = [
    "https://www.w3schools.com/html/mov_bbb.mp4",
    "https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4",
    "https://samplelib.com/lib/preview/mp4/sample-5s.mp4",
    "https://samplelib.com/lib/preview/mp4/sample-10s.mp4",
    "https://filesamples.com/samples/video/mp4/sample_640x360.mp4"
];

let usedVideos = [];

function getUniqueVideo(){
    let available = videoPool.filter(v => !usedVideos.includes(v));

    if(available.length === 0){
        usedVideos = [];
        available = videoPool;
    }

    let video = available[Math.floor(Math.random()*available.length)];
    usedVideos.push(video);

    return video;
}

let reels = document.getElementById("reels");

function loadReels(count=3){
    for(let i=0;i<count;i++){
        let vid = getUniqueVideo();

        reels.innerHTML += `
        <div class="reel">
            <video src="${vid}" autoplay muted loop playsinline></video>
        </div>`;
    }
}

/* autoplay only visible */
function handlePlayback(){
    let videos = document.querySelectorAll(".reel video");

    videos.forEach(v=>{
        let rect = v.getBoundingClientRect();

        if(rect.top >= 0 && rect.top < window.innerHeight/2){
            v.play();
        } else {
            v.pause();
        }
    });
}

/* infinite reels */
reels.addEventListener("scroll", ()=>{
    handlePlayback();

    if(reels.scrollTop + reels.clientHeight >= reels.scrollHeight - 50){
        loadReels(2);
    }
});

/* ---------------- SCROLL FEED ---------------- */

let loading=false;

window.addEventListener("scroll", ()=>{
    if(!loading && window.innerHeight + window.scrollY >= document.body.offsetHeight - 50){
        loading=true;

        setTimeout(()=>{
            if(home.classList.contains("active")){
                loadMorePosts();
                render();
            }

            loading=false;
        },800);
    }
});

/* ---------------- INIT ---------------- */

render();
loadReels(5);

</script>

</body>
</html>
