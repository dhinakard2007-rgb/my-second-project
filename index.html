<!DOCTYPE html>
<html>
<head>
<title>D1n4xx</title>

<style>
body { margin:0; font-family:Arial; background:black; color:white; }

/* Splash */
#splash {
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
    font-weight:bold;
    background:black;
    z-index:10;
}

/* Pages */
.page { display:none; padding-bottom:60px; }
.active { display:block; }

.header {
    text-align:center;
    padding:15px;
    border-bottom:1px solid #333;
}

/* Feed */
.feed { max-width:500px; margin:auto; }

.post img { width:100%; }

.topbar { display:flex; padding:10px; }
.profile { width:35px; height:35px; border-radius:50%; background:#555; }
.username { margin-left:10px; }

.actions { padding:10px; }
.caption { padding:0 10px; }

/* Profile */
.profile-page { text-align:center; padding:20px; }

.profile-pic {
    width:90px;
    height:90px;
    border-radius:50%;
    background:#555;
    margin:auto;
    overflow:hidden;
}

.profile-pic img { width:100%; height:100%; object-fit:cover; }

.stats {
    display:flex;
    justify-content:center;
    gap:20px;
    margin:15px;
}

/* Grid */
.grid {
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:2px;
}

.grid img {
    width:100%;
    height:120px;
    object-fit:cover;
}

/* Nav */
.nav {
    position:fixed;
    bottom:0;
    width:100%;
    background:#111;
    display:flex;
    justify-content:space-around;
    padding:10px;
}
</style>
</head>

<body>

<div id="splash">D1n4xx</div>

<!-- HOME -->
<div id="home" class="page active">
    <div class="header">📸 D1n4xx</div>
    <div style="text-align:center; padding:10px;">
        <input type="file" id="fileInput">
        <button onclick="upload()">Upload</button>
    </div>
    <div class="feed" id="feed"></div>
</div>

<!-- PROFILE -->
<div id="profile" class="page">

    <div class="header">Profile</div>

    <div class="profile-page">

        <div class="profile-pic" onclick="document.getElementById('profileInput').click()">
            <img id="profileImg">
        </div>
        <input type="file" id="profileInput" hidden onchange="uploadProfile()">

        <h2>d1n4xx</h2>

        <div class="stats">
            <div><b id="postCount">0</b><br>Posts</div>
            <div onclick="changeFollowers()"><b id="followers">100</b><br>Followers</div>
            <div><b>50</b><br>Following</div>
        </div>

        <p>Tap profile pic to change 👆</p>

    </div>

    <!-- Grid -->
    <div class="grid" id="grid"></div>

</div>

<!-- NAV -->
<div class="nav">
    <div onclick="showPage('home')">🏠</div>
    <div onclick="showPage('profile')">👤</div>
</div>

<script>

// Splash
setTimeout(()=>{ splash.style.display="none"; },2000);

// Page switch
function showPage(id){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

// Posts
let posts = JSON.parse(localStorage.getItem("posts")) || [
    "https://picsum.photos/500/400?1",
    "https://picsum.photos/500/450?2"
];

// Profile pic
if(localStorage.getItem("profile")){
    document.getElementById("profileImg").src = localStorage.getItem("profile");
}

// Followers
let followers = localStorage.getItem("followers") || 100;
document.getElementById("followers").innerText = followers;

function changeFollowers(){
    followers++;
    localStorage.setItem("followers", followers);
    document.getElementById("followers").innerText = followers;
}

// Render
function render(){
    let feed = document.getElementById("feed");
    let grid = document.getElementById("grid");

    feed.innerHTML="";
    grid.innerHTML="";
    document.getElementById("postCount").innerText = posts.length;

    posts.forEach((src,i)=>{

        // Feed
        feed.innerHTML += `
        <div class="post">
            <div class="topbar">
                <div class="profile"></div>
                <div class="username">d1n4xx</div>
            </div>
            <img src="${src}">
            <div class="caption">🔥 D1n4xx</div>
        </div>`;

        // Grid
        grid.innerHTML += `<img src="${src}">`;
    });
}

// Upload post
function upload(){
    let file = fileInput.files[0];
    if(!file) return;

    let reader = new FileReader();
    reader.onload = e=>{
        posts.unshift(e.target.result);
        localStorage.setItem("posts", JSON.stringify(posts));
        render();
    };
    reader.readAsDataURL(file);
}

// Upload profile
function uploadProfile(){
    let file = profileInput.files[0];
    if(!file) return;

    let reader = new FileReader();
    reader.onload = e=>{
        localStorage.setItem("profile", e.target.result);
        document.getElementById("profileImg").src = e.target.result;
    };
    reader.readAsDataURL(file);
}

// Infinite scroll
let loading=false;
window.addEventListener("scroll", ()=>{
    if(!loading && window.innerHeight + window.scrollY >= document.body.offsetHeight - 50){
        loading=true;
        setTimeout(()=>{
            for(let i=0;i<5;i++){
                posts.push("https://picsum.photos/500/"+(300+Math.random()*200));
            }
            render();
            loading=false;
        },800);
    }
});

render();

</script>

</body>
</html>
