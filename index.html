<!DOCTYPE html>
<html>
<head>
<title>D1n4xx</title>

<style>
body { margin:0; font-family:Arial; background:black; color:white; }

/* Splash */
#splash {
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
    background:black;
    z-index:10;
}

/* Pages */
.page { display:none; padding-bottom:60px; }
.active { display:block; }

/* Header */
.header {
    text-align:center;
    padding:15px;
    border-bottom:1px solid #333;
}

/* Feed */
.feed { max-width:500px; margin:auto; }

.post { border-bottom:1px solid #222; margin-bottom:20px; }

.post img { width:100%; }

.actions { padding:10px; }

.comments { padding:10px; }

/* Heart */
.heart {
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%,-50%) scale(0);
    font-size:80px;
    opacity:0;
    transition:0.3s;
}
.show { transform:translate(-50%,-50%) scale(1); opacity:1; }

/* Reels */
.reel {
    height:100vh;
    position:relative;
}

.reel video {
    width:100%;
    height:100%;
    object-fit:cover;
}

/* Profile */
.profile-page { text-align:center; padding:20px; }

.profile-pic {
    width:90px;
    height:90px;
    border-radius:50%;
    background:#555;
    margin:auto;
    overflow:hidden;
}
.profile-pic img { width:100%; height:100%; object-fit:cover; }

.grid {
    display:grid;
    grid-template-columns:repeat(3,1fr);
}
.grid img {
    width:100%;
    height:120px;
    object-fit:cover;
}

/* Nav */
.nav {
    position:fixed;
    bottom:0;
    width:100%;
    background:#111;
    display:flex;
    justify-content:space-around;
    padding:10px;
}
</style>
</head>

<body>

<div id="splash">D1n4xx</div>

<!-- HOME -->
<div id="home" class="page active">
    <div class="header">Home</div>

    <div style="text-align:center;">
        <input type="file" id="fileInput">
        <button onclick="upload()">Upload</button>
    </div>

    <div id="feed"></div>
</div>

<!-- REELS -->
<div id="reels" class="page"></div>

<!-- PROFILE -->
<div id="profile" class="page">

    <div class="header">Profile</div>

    <div class="profile-page">
        <div class="profile-pic" onclick="profileInput.click()">
            <img id="profileImg">
        </div>
        <input type="file" id="profileInput" hidden onchange="uploadProfile()">

        <h2>d1n4xx</h2>
        <p><b id="followers">100</b> Followers</p>
    </div>

    <div class="grid" id="grid"></div>

</div>

<!-- NAV -->
<div class="nav">
    <div onclick="showPage('home')">🏠</div>
    <div onclick="showPage('reels')">🎬</div>
    <div onclick="showPage('profile')">👤</div>
</div>

<script>

// Splash
setTimeout(()=> splash.style.display="none",2000);

// Page switch
function showPage(id){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

// POSTS
let posts = JSON.parse(localStorage.getItem("posts")) || [
    "https://picsum.photos/500/400?1",
    "https://picsum.photos/500/450?2"
];

// PROFILE
if(localStorage.getItem("profile")){
    profileImg.src = localStorage.getItem("profile");
}

// RENDER
function render(){
    let feed = document.getElementById("feed");
    let grid = document.getElementById("grid");

    feed.innerHTML="";
    grid.innerHTML="";

    posts.forEach((src,i)=>{
        feed.innerHTML += `
        <div class="post">
            <div style="position:relative;">
                <img src="${src}" ondblclick="doubleLike(this)">
                <div class="heart">❤️</div>
            </div>
            <div class="actions">
                <span onclick="toggleLike(this)">♡</span>
            </div>
            <div class="comments">
                <div id="c-${i}"></div>
                <input placeholder="comment..." onkeydown="addComment(event,${i})">
            </div>
        </div>`;

        grid.innerHTML += `<img src="${src}">`;
    });
}

// LIKE
function toggleLike(el){
    el.innerText = el.innerText=="♡" ? "❤️" : "♡";
}

// DOUBLE TAP
function doubleLike(img){
    let h = img.nextElementSibling;
    h.classList.add("show");
    setTimeout(()=>h.classList.remove("show"),600);
}

// COMMENT
function addComment(e,i){
    if(e.key==="Enter"){
        document.getElementById("c-"+i).innerHTML += `<div>${e.target.value}</div>`;
        e.target.value="";
    }
}

// UPLOAD
function upload(){
    let file = fileInput.files[0];
    if(!file) return;

    let reader = new FileReader();
    reader.onload = e=>{
        posts.unshift(e.target.result);
        localStorage.setItem("posts",JSON.stringify(posts));
        render();
    };
    reader.readAsDataURL(file);
}

// PROFILE IMAGE
function uploadProfile(){
    let file = profileInput.files[0];
    if(!file) return;

    let reader = new FileReader();
    reader.onload = e=>{
        localStorage.setItem("profile", e.target.result);
        profileImg.src = e.target.result;
    };
    reader.readAsDataURL(file);
}

// REELS FAKE
let reels = document.getElementById("reels");

function loadReels(){
    for(let i=0;i<3;i++){
        reels.innerHTML += `
        <div class="reel">
            <video src="https://www.w3schools.com/html/mov_bbb.mp4" autoplay loop muted></video>
        </div>`;
    }
}

window.addEventListener("scroll", ()=>{
    if(window.innerHeight + window.scrollY >= document.body.offsetHeight-50){
        loadReels();
    }
});

// INITIAL
render();
loadReels();

</script>

</body>
</html>
