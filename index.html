<!DOCTYPE html>
<html>
<head>
<title>D1n4xx</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:black;
    color:white;
}

/* SPLASH */
#splash {
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
    background:black;
    z-index:10;
}

/* PAGES */
.page { display:none; }
.active { display:block; }

/* HEADER */
.header {
    text-align:center;
    padding:15px;
    border-bottom:1px solid #333;
}

/* ================= FEED (INSTAGRAM STYLE) ================= */

.feed {
    height:100vh;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
}

.post {
    height:100vh;
    scroll-snap-align:start;
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
}

.post img {
    width:100%;
    height:100%;
    object-fit:cover;
}

/* like animation */
.heart {
    position:absolute;
    font-size:80px;
    color:red;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    opacity:0;
    transition:0.3s;
}

.heart.show {
    transform:translate(-50%,-50%) scale(1);
    opacity:1;
}

/* comment */
.post-ui {
    position:absolute;
    bottom:60px;
    left:10px;
    right:10px;
}

.comment-box {
    width:100%;
    padding:5px;
}

/* ================= REELS ================= */

#reels {
    height:100vh;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
}

.reel {
    height:100vh;
    scroll-snap-align:start;
}

.reel video {
    width:100%;
    height:100%;
    object-fit:cover;
}

/* ================= PROFILE ================= */

.profile-page {
    text-align:center;
    padding:20px;
}

.profile-pic {
    width:90px;
    height:90px;
    border-radius:50%;
    overflow:hidden;
    margin:auto;
    background:#555;
}

.profile-pic img {
    width:100%;
    height:100%;
    object-fit:cover;
}

.grid {
    display:grid;
    grid-template-columns:repeat(3,1fr);
}

.grid img {
    width:100%;
    height:120px;
    object-fit:cover;
}

/* ================= NAV ================= */

.nav {
    position:fixed;
    bottom:0;
    width:100%;
    background:#111;
    display:flex;
    justify-content:space-around;
    padding:10px;
}

.nav div {
    font-size:20px;
    cursor:pointer;
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">D1n4xx</div>

<!-- HOME -->
<div id="home" class="page active">
    <div class="header">Home</div>
    <div id="feed" class="feed"></div>
</div>

<!-- REELS -->
<div id="reels" class="page"></div>

<!-- PROFILE -->
<div id="profile" class="page">

    <div class="header">Profile</div>

    <div class="profile-page">

        <div class="profile-pic" onclick="profileInput.click()">
            <img id="profileImg">
        </div>

        <input type="file" id="profileInput" hidden onchange="uploadProfile()">

        <h2>D1n4xx</h2>

    </div>

    <div class="grid" id="grid"></div>
</div>

<!-- NAV -->
<div class="nav">
    <div onclick="show('home')">🏠</div>
    <div onclick="show('reels')">🎬</div>
    <div onclick="show('profile')">👤</div>
</div>

<script>

/* SPLASH */
setTimeout(()=> splash.style.display="none",2000);

/* NAV */
function show(id){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

/* ================= INFINITE IMAGES ================= */

let feed = document.getElementById("feed");
let grid = document.getElementById("grid");

let posts = [];
let count = 0;

function newImage(){
    count++;
    return `https://picsum.photos/seed/${Date.now()+Math.random()+count}/500/900`;
}

// initial load
for(let i=0;i<12;i++) posts.push(newImage());

function render(){
    feed.innerHTML="";
    grid.innerHTML="";

    posts.forEach((src,i)=>{
        feed.innerHTML += `
        <div class="post" ondblclick="like(this)">
            <img src="${src}">
            <div class="heart">❤️</div>

            <div class="post-ui">
                <input class="comment-box"
                placeholder="comment..."
                onkeydown="comment(event,${i})">

                <div id="c-${i}"></div>
            </div>
        </div>`;

        grid.innerHTML += `<img src="${src}">`;
    });
}

/* LIKE */
function like(el){
    let h = el.querySelector(".heart");
    h.classList.add("show");
    setTimeout(()=>h.classList.remove("show"),600);
}

/* COMMENTS */
function comment(e,i){
    if(e.key==="Enter"){
        document.getElementById("c-"+i).innerHTML += `<div>💬 ${e.target.value}</div>`;
        e.target.value="";
    }
}

/* INFINITE SCROLL */
window.addEventListener("scroll", ()=>{
    if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 80){

        for(let i=0;i<5;i++){
            posts.push(newImage());
        }

        render();
    }
});

/* ================= REELS ================= */

let reels = document.getElementById("reels");

let videos = [
    "https://www.w3schools.com/html/mov_bbb.mp4",
    "https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4",
    "https://samplelib.com/lib/preview/mp4/sample-5s.mp4",
    "https://samplelib.com/lib/preview/mp4/sample-10s.mp4"
];

function randomVideo(){
    return videos[Math.floor(Math.random()*videos.length)];
}

function loadReels(){
    for(let i=0;i<5;i++){
        reels.innerHTML += `
        <div class="reel">
            <video src="${randomVideo()}" autoplay muted loop playsinline></video>
        </div>`;
    }
}

/* ================= PROFILE ================= */

if(localStorage.getItem("profile")){
    profileImg.src = localStorage.getItem("profile");
}

function uploadProfile(){
    let file = profileInput.files[0];
    let reader = new FileReader();

    reader.onload = e=>{
        localStorage.setItem("profile",e.target.result);
        profileImg.src = e.target.result;
    };

    reader.readAsDataURL(file);
}

/* INIT */
render();
loadReels();

</script>

</body>
</html>
