<!DOCTYPE html>
<html>
<head>
    <title>D1n4xx Gallery</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f0f0f;
            color: white;
        }

        h1 {
            text-align: center;
            padding: 20px;
        }

        .grid {
            column-count: 3;
            column-gap: 10px;
            padding: 15px;
        }

        .grid img {
            width: 100%;
            margin-bottom: 10px;
            border-radius: 15px;
            cursor: pointer;
        }

        .viewer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .viewer img {
            max-width: 90%;
            max-height: 80%;
        }
    </style>
</head>

<body>

<h1>🚀 D1n4xx Gallery</h1>

<div class="grid" id="gallery">
    <img src="https://picsum.photos/300/400?random=1">
    <img src="https://picsum.photos/300/350?random=2">
    <img src="https://picsum.photos/300/450?random=3">
</div>

<div class="viewer" id="viewer">
    <img id="viewer-img">
    <button onclick="closeViewer()">Close</button>
</div>

<script>
let images = document.querySelectorAll("#gallery img");
let viewer = document.getElementById("viewer");
let viewerImg = document.getElementById("viewer-img");

images.forEach(img => {
    img.onclick = () => {
        viewer.style.display = "flex";
        viewerImg.src = img.src;
    };
});

function closeViewer() {
    viewer.style.display = "none";
}
</script>

</body>
</html>
