<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insta Feed Clone</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:black;
    color:white;
}

/* Feed container */
.feed {
    max-width:500px;
    margin:auto;
    padding-bottom:80px;
}

/* Post card */
.post {
    background:#111;
    margin:12px 10px;
    border-radius:12px;
    overflow:hidden;
}

/* image */
.post img {
    width:100%;
    display:block;
}

/* actions row */
.actions {
    display:flex;
    justify-content:space-between;
    padding:10px;
    font-size:22px;
}

.left {
    display:flex;
    gap:15px;
    cursor:pointer;
}

/* info */
.info {
    padding:0 10px 10px 10px;
}

.username {
    font-weight:bold;
    font-size:14px;
}

.caption {
    color:#ccc;
    font-size:13px;
    margin-top:3px;
}

/* comment */
.comment {
    width:94%;
    margin:5px 10px 10px 10px;
    padding:6px;
    border-radius:6px;
    border:none;
}

/* heart animation */
.heart {
    position:absolute;
    font-size:80px;
    color:red;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    opacity:0;
    transition:0.3s;
    pointer-events:none;
}

.post-wrap {
    position:relative;
}

.heart.show {
    transform:translate(-50%,-50%) scale(1);
    opacity:1;
}

</style>
</head>

<body>

<div class="feed" id="feed"></div>

<script>

let feed = document.getElementById("feed");
let posts = [];

/* random images */
function img(){
    return "https://picsum.photos/seed/" + Math.random() + "/500/600";
}

/* initial posts */
for(let i=0;i<8;i++){
    posts.push(img());
}

/* render */
function render(){
    feed.innerHTML="";

    posts.forEach((src,i)=>{
        feed.innerHTML += `
        <div class="post">

            <div class="post-wrap" ondblclick="like(this)">
                <img src="${src}">
                <div class="heart">❤️</div>
            </div>

            <div class="actions">
                <div class="left">
                    <span>❤️</span>
                    <span>💬</span>
                </div>
                <span>📌</span>
            </div>

            <div class="info">
                <div class="username">d1n4xx</div>
                <div class="caption">Enjoying life 🚀</div>
            </div>

            <input class="comment" placeholder="Add a comment...">

        </div>`;
    });
}

/* like animation */
function like(el){
    let h = el.querySelector(".heart");
    h.classList.add("show");
    setTimeout(()=>h.classList.remove("show"),600);
}

/* infinite scroll */
window.addEventListener("scroll", ()=>{
    if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 100){

        for(let i=0;i<5;i++){
            posts.push(img());
        }

        render();
    }
});

/* init */
render();

</script>

</body>
</html>
