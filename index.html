<!DOCTYPE html>
<html>
<head>
    <title>D1n4xx</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #000;
            color: white;
        }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            background: #000;
            padding: 15px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            border-bottom: 1px solid #333;
        }

        /* Stories */
        .stories {
            display: flex;
            overflow-x: auto;
            padding: 10px;
            border-bottom: 1px solid #222;
        }

        .story {
            text-align: center;
            margin-right: 10px;
        }

        .story div {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: gray;
            margin-bottom: 5px;
        }

        /* Feed */
        .feed {
            max-width: 500px;
            margin: auto;
        }

        .post {
            border-bottom: 1px solid #222;
            margin-bottom: 20px;
        }

        .topbar {
            display: flex;
            align-items: center;
            padding: 10px;
        }

        .profile {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #555;
        }

        .username {
            margin-left: 10px;
            font-weight: bold;
        }

        .post img {
            width: 100%;
            cursor: pointer;
        }

        .actions {
            padding: 10px;
            font-size: 20px;
        }

        .like {
            cursor: pointer;
        }

        .liked {
            color: red;
        }

        .caption {
            padding: 0 10px 10px;
            font-size: 14px;
        }

        /* Viewer */
        .viewer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            justify-content: center;
            align-items: center;
        }

        .viewer img {
            max-width: 95%;
            max-height: 95%;
        }

        .close {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 30px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="header">📸 D1n4xx</div>

<!-- Stories -->
<div class="stories">
    <div class="story"><div></div><small>You</small></div>
    <div class="story"><div></div><small>Friend1</small></div>
    <div class="story"><div></div><small>Friend2</small></div>
    <div class="story"><div></div><small>Friend3</small></div>
</div>

<div class="feed">

    <!-- Post 1 -->
    <div class="post">
        <div class="topbar">
            <div class="profile"></div>
            <div class="username">d1n4xx</div>
        </div>

        <img src="https://picsum.photos/500/400?random=1" onclick="openViewer(this.src)">

        <div class="actions">
            <span class="like" onclick="toggleLike(this)">♡</span>
            <span> 💬</span>
            <span> 📤</span>
        </div>

        <div class="caption"><b>d1n4xx</b> First post 🔥</div>
    </div>

    <!-- Post 2 -->
    <div class="post">
        <div class="topbar">
            <div class="profile"></div>
            <div class="username">d1n4xx</div>
        </div>

        <img src="https://picsum.photos/500/450?random=2" onclick="openViewer(this.src)">

        <div class="actions">
            <span class="like" onclick="toggleLike(this)">♡</span>
            <span> 💬</span>
            <span> 📤</span>
        </div>

        <div class="caption"><b>d1n4xx</b> Clean vibes 😎</div>
    </div>

</div>

<!-- Fullscreen Viewer -->
<div class="viewer" id="viewer">
    <span class="close" onclick="closeViewer()">&times;</span>
    <img id="viewer-img">
</div>

<script>
function toggleLike(el) {
    if (el.classList.contains("liked")) {
        el.classList.remove("liked");
        el.innerText = "♡";
    } else {
        el.classList.add("liked");
        el.innerText = "❤️";
    }
}

function openViewer(src) {
    document.getElementById("viewer").style.display = "flex";
    document.getElementById("viewer-img").src = src;
}

function closeViewer() {
    document.getElementById("viewer").style.display = "none";
}
</script>

</body>
</html>
