<!DOCTYPE html>
<html>
<head>
<title>D1n4xx</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:black;
    color:white;
}

/* SPLASH */
#splash {
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
    background:black;
    z-index:10;
}

/* PAGES */
.page {
    display:none;
}
.active {
    display:block;
}

/* HEADER */
.header {
    text-align:center;
    padding:15px;
    border-bottom:1px solid #333;
}

/* ---------------- INSTAGRAM FEED ---------------- */

.feed {
    height:100vh;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
}

.post {
    height:100vh;
    scroll-snap-align:start;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
}

.post img {
    width:100%;
    height:100%;
    object-fit:cover;
}

/* ---------------- REELS ---------------- */

#reels {
    height:100vh;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
}

.reel {
    height:100vh;
    scroll-snap-align:start;
}

.reel video {
    width:100%;
    height:100%;
    object-fit:cover;
}

/* ---------------- PROFILE ---------------- */

.profile-page {
    text-align:center;
    padding:20px;
}

.profile-pic {
    width:90px;
    height:90px;
    border-radius:50%;
    overflow:hidden;
    margin:auto;
    background:#555;
}

.profile-pic img {
    width:100%;
    height:100%;
    object-fit:cover;
}

.grid {
    display:grid;
    grid-template-columns:repeat(3,1fr);
}
.grid img {
    width:100%;
    height:120px;
    object-fit:cover;
}

/* NAV */
.nav {
    position:fixed;
    bottom:0;
    width:100%;
    background:#111;
    display:flex;
    justify-content:space-around;
    padding:10px;
}
.nav div {
    cursor:pointer;
    font-size:20px;
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">D1n4xx</div>

<!-- HOME -->
<div id="home" class="page active">

    <div class="header">Home</div>

    <div style="text-align:center;">
        <input type="file" id="fileInput">
        <button onclick="upload()">Upload</button>
    </div>

    <div id="feed" class="feed"></div>
</div>

<!-- REELS -->
<div id="reels" class="page"></div>

<!-- PROFILE -->
<div id="profile" class="page">

    <div class="header">Profile</div>

    <div class="profile-page">

        <div class="profile-pic" onclick="profileInput.click()">
            <img id="profileImg">
        </div>

        <input type="file" id="profileInput" hidden onchange="uploadProfile()">

        <h2>d1n4xx</h2>

        <p><b id="followers">100</b> Followers</p>
    </div>

    <div class="grid" id="grid"></div>
</div>

<!-- NAV -->
<div class="nav">
    <div onclick="showPage('home')">🏠</div>
    <div onclick="showPage('reels')">🎬</div>
    <div onclick="showPage('profile')">👤</div>
</div>

<script>

/* SPLASH */
setTimeout(()=> splash.style.display="none",2000);

/* NAV */
function showPage(id){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

/* ---------------- IMAGES (INFINITE UNIQUE) ---------------- */

let posts = JSON.parse(localStorage.getItem("posts")) || [];

function randomImage(){
    return "https://picsum.photos/500/" + (300 + Math.floor(Math.random()*400)) + "?r=" + Math.random();
}

if(posts.length === 0){
    for(let i=0;i<15;i++) posts.push(randomImage());
}

/* RENDER */
function render(){
    let feed = document.getElementById("feed");
    let grid = document.getElementById("grid");

    feed.innerHTML="";
    grid.innerHTML="";

    posts.forEach(src=>{
        feed.innerHTML += `
        <div class="post">
            <img src="${src}">
        </div>`;

        grid.innerHTML += `<img src="${src}">`;
    });
}

/* ---------------- UPLOAD ---------------- */

function upload(){
    let file = fileInput.files[0];
    if(!file) return;

    let reader = new FileReader();
    reader.onload = e=>{
        posts.unshift(e.target.result);
        localStorage.setItem("posts", JSON.stringify(posts));
        render();
    };
    reader.readAsDataURL(file);
}

/* ---------------- PROFILE ---------------- */

if(localStorage.getItem("profile")){
    profileImg.src = localStorage.getItem("profile");
}

function uploadProfile(){
    let file = profileInput.files[0];
    if(!file) return;

    let reader = new FileReader();
    reader.onload = e=>{
        localStorage.setItem("profile", e.target.result);
        profileImg.src = e.target.result;
    };
    reader.readAsDataURL(file);
}

/* ---------------- REELS (SIMPLE BUT DIFFERENT VIDEOS) ---------------- */

let reels = document.getElementById("reels");

let videos = [
    "https://www.w3schools.com/html/mov_bbb.mp4",
    "https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4",
    "https://samplelib.com/lib/preview/mp4/sample-5s.mp4"
];

function getVideo(){
    return videos[Math.floor(Math.random()*videos.length)];
}

function loadReels(){
    for(let i=0;i<5;i++){
        reels.innerHTML += `
        <div class="reel">
            <video src="${getVideo()}" autoplay muted loop playsinline></video>
        </div>`;
    }
}

/* SCROLL LOAD */
window.addEventListener("scroll", ()=>{
    if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 50){
        if(home.classList.contains("active")){
            for(let i=0;i<5;i++) posts.push(randomImage());
            render();
        }

        if(reels.classList.contains("active")){
            loadReels();
        }
    }
});

/* INIT */
render();
loadReels();

</script>

</body>
</html>
