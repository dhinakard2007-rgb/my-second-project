<!DOCTYPE html>
<html>
<head>
<title>D1n4xx</title>

<style>
body { margin:0; font-family:Arial; background:black; color:white; }

/* Splash */
#splash {
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
    font-weight:bold;
    background:black;
    z-index:10;
}

/* App */
#app { display:none; }

.header {
    text-align:center;
    padding:15px;
    border-bottom:1px solid #333;
    font-size:22px;
}

/* Upload */
.upload {
    text-align:center;
    padding:10px;
}

/* Feed */
.feed { max-width:500px; margin:auto; }

.post { border-bottom:1px solid #222; margin-bottom:20px; }

.topbar { display:flex; padding:10px; }
.profile { width:35px; height:35px; border-radius:50%; background:#555; }
.username { margin-left:10px; font-weight:bold; }

.post img { width:100%; }

/* Actions */
.actions { padding:10px; font-size:20px; }

/* Caption */
.caption { padding:0 10px; }

/* Comments */
.comments { padding:10px; }

/* Heart animation */
.heart {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    font-size:80px;
    color:red;
    opacity:0;
    transition:0.3s;
}
.show { transform:translate(-50%,-50%) scale(1); opacity:1; }

</style>
</head>

<body>

<!-- Splash -->
<div id="splash">D1n4xx</div>

<!-- App -->
<div id="app">

    <div class="header">📸 D1n4xx</div>

    <!-- Upload -->
    <div class="upload">
        <input type="file" id="fileInput">
        <button onclick="upload()">Upload</button>
    </div>

    <div class="feed" id="feed"></div>

</div>

<script>

// Splash → App
setTimeout(()=>{
    document.getElementById("splash").style.display="none";
    document.getElementById("app").style.display="block";
},2000);

// Posts
let posts = [
    "https://picsum.photos/500/400?1",
    "https://picsum.photos/500/450?2"
];

// Load saved posts
if(localStorage.getItem("posts")){
    posts = JSON.parse(localStorage.getItem("posts"));
}

let feed = document.getElementById("feed");

// Render posts
function render(){
    feed.innerHTML="";
    posts.forEach((src,i)=>{
        feed.innerHTML += `
        <div class="post">

            <div class="topbar">
                <div class="profile"></div>
                <div class="username">d1n4xx</div>
            </div>

            <div style="position:relative;">
                <img src="${src}" ondblclick="doubleLike(this)">
                <div class="heart">❤️</div>
            </div>

            <div class="actions">
                <span onclick="toggleLike(this)">♡</span>
            </div>

            <div class="caption">D1n4xx post 🔥</div>

            <div class="comments">
                <div id="c-${i}"></div>
                <input placeholder="Add comment..." onkeydown="addComment(event,${i})">
            </div>

        </div>`;
    });
}

// Like
function toggleLike(el){
    el.innerText = (el.innerText=="♡") ? "❤️" : "♡";
}

// Double tap
function doubleLike(img){
    let heart = img.nextElementSibling;
    heart.classList.add("show");
    setTimeout(()=>heart.classList.remove("show"),600);
}

// Comments
function addComment(e,i){
    if(e.key==="Enter"){
        let text=e.target.value;
        document.getElementById("c-"+i).innerHTML += `<div>💬 ${text}</div>`;
        e.target.value="";
    }
}

// Upload
function upload(){
    let file = document.getElementById("fileInput").files[0];
    if(!file) return;

    let reader = new FileReader();
    reader.onload = function(e){
        posts.unshift(e.target.result);
        localStorage.setItem("posts",JSON.stringify(posts));
        render();
    };
    reader.readAsDataURL(file);
}

// Infinite scroll
let loading = false;

function loadMore(){
    for(let i=0;i<5;i++){
        let newImg = "https://picsum.photos/500/" + (300 + Math.floor(Math.random()*200)) + "?random=" + Math.random();
        posts.push(newImg);
    }
    render();
}

window.addEventListener("scroll", () => {
    if (!loading && (window.innerHeight + window.scrollY >= document.body.offsetHeight - 50)) {
        loading = true;
        setTimeout(() => {
            loadMore();
            loading = false;
        }, 800);
    }
});

render();

</script>

</body>
</html>
