<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>D1n4xx Insta</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:black;
    color:white;
}

/* pages */
.page{display:none;}
.active{display:block;}

/* nav */
.nav{
    position:fixed;
    bottom:0;
    width:100%;
    background:#111;
    display:flex;
    justify-content:space-around;
    padding:10px;
    z-index:10;
}

/* ================= HOME ================= */

.stories{
    display:flex;
    overflow-x:auto;
    padding:10px;
    gap:10px;
}

.story img{
    width:55px;
    height:55px;
    border-radius:50%;
    border:2px solid pink;
}

.feed{
    max-width:500px;
    margin:auto;
    height:calc(100vh - 120px);
    overflow-y:auto;
    padding-bottom:80px;
}

.post{
    background:#111;
    margin:12px;
    border-radius:12px;
    overflow:hidden;
}

.post img{width:100%;}

.actions{
    display:flex;
    justify-content:space-between;
    padding:10px;
}

.info{
    padding:0 10px 10px;
}

.username{font-weight:bold;}
.caption{font-size:13px;color:#ccc;}

.comment{
    width:95%;
    margin:5px 10px 10px;
    padding:6px;
}

/* heart */
.heart{
    position:absolute;
    font-size:70px;
    color:red;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    opacity:0;
    transition:0.3s;
}

.wrap{position:relative;}
.show{transform:translate(-50%,-50%) scale(1);opacity:1;}

/* ================= SEARCH ================= */

.search-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
}

.search-grid img{
    width:100%;
    height:120px;
    object-fit:cover;
}

/* ================= REELS ================= */

#reels{
    height:100vh;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
}

.reel{
    height:100vh;
    scroll-snap-align:start;
}

.reel video{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* ================= MESSAGES ================= */

.chat{
    height:80vh;
    overflow:auto;
    padding:10px;
}

.msg{
    background:#222;
    margin:5px;
    padding:8px;
    border-radius:8px;
}

/* ================= PROFILE ================= */

.profile{
    text-align:center;
    padding:20px;
}

.pfp{
    width:90px;
    height:90px;
    border-radius:50%;
    overflow:hidden;
    margin:auto;
    background:#333;
}

.pfp img{width:100%;height:100%;}

.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
}

.grid img{
    width:100%;
    height:120px;
    object-fit:cover;
}

</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="page active">
<div class="stories" id="stories"></div>
<div class="feed" id="feed"></div>
</div>

<!-- SEARCH -->
<div id="search" class="page">
<div class="search-grid" id="searchGrid"></div>
</div>

<!-- REELS -->
<div id="reels" class="page"></div>

<!-- MESSAGES -->
<div id="messages" class="page">
<div class="chat" id="chat"></div>
<input id="msgInput" placeholder="Type message..." style="width:100%">
</div>

<!-- PROFILE -->
<div id="profile" class="page">

<div class="profile">
<div class="pfp" onclick="file.click()">
<img id="profileImg">
</div>
<input type="file" id="file" hidden onchange="upload()">
<h3>D1n4xx</h3>
</div>

<div class="grid" id="grid"></div>
</div>

<!-- NAV -->
<div class="nav">
<div onclick="show('home')">🏠</div>
<div onclick="show('search')">🔍</div>
<div onclick="show('reels')">🎬</div>
<div onclick="show('messages')">💬</div>
<div onclick="show('profile')">👤</div>
</div>

<script>

/* NAVIGATION */
function show(id){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

/* IMAGE GENERATOR */
function img(){
    return "https://picsum.photos/seed/"+Math.random()+"/500/600";
}

/* ================= STORIES ================= */
let stories=document.getElementById("stories");
for(let i=0;i<8;i++){
    stories.innerHTML+=`<div class="story"><img src="https://i.pravatar.cc/100?img=${i}"></div>`;
}

/* ================= FEED ================= */
let feed=document.getElementById("feed");
let posts=[];

for(let i=0;i<8;i++) posts.push(img());

function renderFeed(){
    feed.innerHTML="";
    posts.forEach((src,i)=>{
        feed.innerHTML+=`
        <div class="post">
            <div class="wrap" ondblclick="like(this)">
                <img src="${src}">
                <div class="heart">❤️</div>
            </div>

            <div class="actions">❤️ 💬 📌</div>

            <div class="info">
                <div class="username">user_${i}</div>
                <div class="caption">My post 🔥</div>
            </div>

            <input class="comment" placeholder="Add comment...">
        </div>`;
    });
}

function like(el){
    let h=el.querySelector(".heart");
    h.classList.add("show");
    setTimeout(()=>h.classList.remove("show"),500);
}

/* infinite scroll ONLY inside feed */
feed.addEventListener("scroll",()=>{
    if(feed.scrollTop + feed.clientHeight >= feed.scrollHeight - 100){
        for(let i=0;i<5;i++) posts.push(img());
        renderFeed();
    }
});

/* ================= SEARCH ================= */
let searchGrid=document.getElementById("searchGrid");
for(let i=0;i<30;i++){
    searchGrid.innerHTML+=`<img src="${img()}">`;
}

/* ================= REELS ================= */
let reels=document.getElementById("reels");
let vids=[
"https://www.w3schools.com/html/mov_bbb.mp4",
"https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4"
];

for(let i=0;i<5;i++){
    reels.innerHTML+=`
    <div class="reel">
        <video src="${vids[i%2]}" autoplay muted loop></video>
    </div>`;
}

/* ================= MESSAGES ================= */
msgInput.addEventListener("keydown",e=>{
    if(e.key==="Enter"){
        chat.innerHTML+=`<div class="msg">${msgInput.value}</div>`;
        msgInput.value="";
        chat.scrollTop=chat.scrollHeight;
    }
});

/* ================= PROFILE ================= */

if(localStorage.getItem("pfp")){
    profileImg.src=localStorage.getItem("pfp");
}

function upload(){
    let f=file.files[0];
    let r=new FileReader();
    r.onload=e=>{
        localStorage.setItem("pfp",e.target.result);
        profileImg.src=e.target.result;
    };
    r.readAsDataURL(f);
}

let grid=document.getElementById("grid");
for(let i=0;i<12;i++){
    grid.innerHTML+=`<img src="${img()}">`;
}

/* INIT */
renderFeed();

</script>

</body>
</html>
