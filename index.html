<!DOCTYPE html>
<html>
<head>
<title>D1n4xx</title>

<style>
body { margin:0; font-family:Arial; background:#000; color:white; }

.header {
    text-align:center;
    padding:15px;
    font-size:22px;
    border-bottom:1px solid #333;
}

/* Upload */
.upload {
    text-align:center;
    padding:10px;
}

/* Feed */
.feed { max-width:500px; margin:auto; }

.post { border-bottom:1px solid #222; margin-bottom:20px; }

.topbar { display:flex; padding:10px; }
.profile { width:35px; height:35px; border-radius:50%; background:#555; }
.username { margin-left:10px; font-weight:bold; }

.post img { width:100%; }

.actions { padding:10px; font-size:20px; }
.liked { color:red; }

.caption { padding:0 10px; }

.comments {
    padding:10px;
}

input {
    width:80%;
    padding:5px;
}
button {
    padding:5px;
}

/* Heart animation */
.heart {
    position:absolute;
    font-size:80px;
    color:red;
    opacity:0;
    transform:scale(0);
    transition:0.3s;
}
.show { opacity:1; transform:scale(1); }

</style>
</head>

<body>

<div class="header">📸 D1n4xx</div>

<!-- Upload -->
<div class="upload">
    <input type="file" id="fileInput">
    <button onclick="upload()">Upload</button>
</div>

<div class="feed" id="feed"></div>

<script>
let feed = document.getElementById("feed");

// Default posts
let posts = [
    "https://picsum.photos/500/400?1",
    "https://picsum.photos/500/450?2"
];

// Load saved posts
if(localStorage.getItem("posts")){
    posts = JSON.parse(localStorage.getItem("posts"));
}

function render(){
    feed.innerHTML = "";
    posts.forEach((src, i)=>{
        feed.innerHTML += `
        <div class="post">

            <div class="topbar">
                <div class="profile"></div>
                <div class="username">d1n4xx</div>
            </div>

            <div style="position:relative;">
                <img src="${src}" ondblclick="likeDouble(this)">
                <div class="heart">❤️</div>
            </div>

            <div class="actions">
                <span onclick="toggleLike(this)">♡</span>
            </div>

            <div class="caption">Cool post 😎</div>

            <div class="comments">
                <div id="comments-${i}"></div>
                <input placeholder="Add comment..." onkeydown="addComment(event, ${i})">
            </div>

        </div>`;
    });
}

function toggleLike(el){
    if(el.innerText=="♡"){
        el.innerText="❤️";
    } else {
        el.innerText="♡";
    }
}

// Double tap ❤️
function likeDouble(img){
    let heart = img.nextElementSibling;
    heart.classList.add("show");
    setTimeout(()=>heart.classList.remove("show"),600);
}

// Comments
function addComment(e, i){
    if(e.key === "Enter"){
        let text = e.target.value;
        let box = document.getElementById("comments-"+i);
        box.innerHTML += `<div>💬 ${text}</div>`;
        e.target.value="";
    }
}

// Upload system (local)
function upload(){
    let file = document.getElementById("fileInput").files[0];
    if(!file) return;

    let reader = new FileReader();
    reader.onload = function(e){
        posts.unshift(e.target.result);
        localStorage.setItem("posts", JSON.stringify(posts));
        render();
    };
    reader.readAsDataURL(file);
}

render();
</script>

</body>
</html>
